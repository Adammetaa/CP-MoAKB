name: Bug report
description: Report a reproducible problem in CP-MoAKB
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: Clearly describe the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Parser
        - Exporter
        - Semantic validation
        - Database schema or builder
        - Official source or golden baseline
        - Tests or CI
        - Documentation or governance
        - Other
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.11.x"
    validations:
      required: true
  - type: input
    id: operating_system
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04, ..."
    validations:
      required: true
  - type: checkboxes
    id: source_integrity
    attributes:
      label: Official-data integrity
      options:
        - label: I confirm that I did not manually edit the official source data to reproduce this problem.
          required: true
