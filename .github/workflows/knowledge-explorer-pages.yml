name: Knowledge Explorer Pages Preview

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/knowledge-explorer-pages.yml"
      - "prototype/knowledge-explorer/**"
      - "tests/deployment/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: knowledge-explorer-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build governed Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Establish deterministic deployment identity
        shell: bash
        run: |
          commit_timestamp="$(git show -s --format=%cI "$GITHUB_SHA")"
          {
            echo "DEPLOY_COMMIT=$GITHUB_SHA"
            echo "BUILD_TIMESTAMP=$commit_timestamp"
            echo "PACKAGE_VERSION=0.1.0"
          } >> "$GITHUB_ENV"

      - name: Build and validate static preview
        working-directory: prototype/knowledge-explorer
        run: node scripts/build.mjs

      - name: Verify artifact boundary
        working-directory: prototype/knowledge-explorer
        run: node scripts/verify-pages-artifact.mjs dist/pages-root

      - name: Run repository-subpath smoke test
        working-directory: prototype/knowledge-explorer
        run: node scripts/smoke-test.mjs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: prototype/knowledge-explorer/dist/pages-root
          retention-days: 1

  deploy:
    name: Deploy governed Pages preview
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
