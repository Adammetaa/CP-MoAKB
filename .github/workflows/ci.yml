name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTEST_ADDOPTS: "-p no:cacheprovider"
      RUFF_NO_CACHE: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check governed formatting
        run: >-
          python -m black --check cpmoakb/__init__.py cpmoakb/_version.py
          cpmoakb/runtime_api.py cpmoakb/domain cpmoakb/adapters
          cpmoakb/validation cpmoakb/registries cpmoakb/query cpmoakb/explain
          cpmoakb/serialization cpmoakb/application cpmoakb/http_api cpmoakb/cli
          cpmoakb/composition tests/contracts tests/application
          tests/serialization tests/http_api tests/cli tests/packaging
          tests/security tests/documentation examples scripts
          --exclude cpmoakb/validation/irac_validator.py

      - name: Run governed type checks
        run: >-
          python -m mypy --explicit-package-bases
          --disable-error-code import-untyped
          --cache-dir=/dev/null
          --exclude cpmoakb/validation/irac_validator.py
          cpmoakb/runtime_api.py cpmoakb/domain cpmoakb/adapters
          cpmoakb/validation cpmoakb/registries cpmoakb/query cpmoakb/explain
          cpmoakb/serialization cpmoakb/application cpmoakb/http_api cpmoakb/cli
          cpmoakb/composition tests/contracts tests/application
          tests/serialization tests/http_api tests/cli tests/packaging
          tests/security tests/documentation examples scripts

      - name: Run test suite
        run: python -m pytest -q

      - name: Verify tests were read-only
        if: always()
        shell: bash
        run: |
          status=0

          if [[ -n "$(git status --porcelain --untracked-files=all)" ]]; then
            echo "Tests changed tracked files or created visible untracked files."
            git status --short --untracked-files=all
            status=1
          fi

          while IFS= read -r -d '' artifact; do
            relative_path="${artifact#./}"
            if ! git ls-files --error-unmatch "$relative_path" >/dev/null 2>&1; then
              echo "Prohibited generated artifact: $relative_path"
              status=1
            fi
          done < <(
            find . -path './.git' -prune -o -type f \
              \( -iname '*.csv' -o -iname '*.db' -o -iname '*.sqlite' -o -iname '*.sqlite3' \) \
              -print0
          )

          exit "$status"

  security:
    name: Security and release readiness
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTEST_ADDOPTS: "-p no:cacheprovider"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pre-resolved development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run focused security tests
        run: python -m pytest tests/security -q

      - name: Verify security contract
        run: python scripts/verify_security_contract.py

      - name: Verify release readiness
        run: python scripts/verify_release_readiness.py

      - name: Verify security checks were read-only
        if: always()
        run: git diff --exit-code && test -z "$(git status --porcelain --untracked-files=all)"

  documentation:
    name: Documentation and Examples
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTEST_ADDOPTS: "-p no:cacheprovider"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pre-resolved development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run documentation contract tests
        run: python -m pytest tests/documentation -q

      - name: Verify documentation
        run: python scripts/verify_documentation.py

      - name: Verify executable examples
        run: python scripts/verify_examples.py

      - name: Verify documentation checks were read-only
        if: always()
        run: git diff --exit-code && test -z "$(git status --porcelain --untracked-files=all)"

  packaging:
    name: Distribution contract
    needs:
      - test
      - security
      - documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      SOURCE_DATE_EPOCH: "315532800"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pre-resolved development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Build wheel and source distribution twice
        run: |
          python -m build --no-isolation --outdir dist
          python -m build --no-isolation --outdir dist-repeat

      - name: Verify artifact metadata and contents
        run: >-
          python scripts/verify_distribution.py
          --dist-dir dist --compare-dir dist-repeat

      - name: Verify release artifact security
        run: python scripts/verify_release_readiness.py --dist-dir dist

      - name: Verify isolated installation paths
        run: python scripts/verify_installation.py --dist-dir dist

      - name: Confirm generated artifacts remain ignored
        run: git status --short --untracked-files=all
