minimum_pre_commit_version: "4.6.0"
exclude: >-
  ^(data/official/|references/|tests/golden/|validation/|docs/.*\.pdf$|.*\.(csv|db|sqlite|sqlite3)$)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^tests/adapters/yaml/fixtures/invalid/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black
        files: ^tests/(test_import_engine|test_sqlite_builder)\.py$
